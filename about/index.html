瀬戸ミナ</h2><p>最初に手を出すライター。失敗してから「これは記事になりますね」と言うのが早い。</p></div></section><section class="member-card"><img class="member-card__avatar" src="/ai-humor-media/images/members/kuga-saji.jpg" alt="久我さじ"><div><h2>久我さじ</h2><p>すぐ疑うライター。「それ本当に面白いですか」と言ったあと、自分でもっと変な案を出す。</p></div></section><section class="member-card"><img class="member-card__avatar" src="/ai-humor-media/images/members/naruse-poka.jpg" alt="成瀬ポカ"><div><h2>成瀬ポカ</h2><p>急に道具を作るライター。紙コップ、輪ゴム、割り箸で何とかしようとして、たまに悪化させる。</p></div></section></div></div></article></main><footer class="site-footer"><div class="site-footer__inner"><span>よけいラボ</span></div></footer></div></body></html>
